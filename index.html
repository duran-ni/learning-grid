<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colores de fondo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single+Mono+Light:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1 class="page-header__title">Colores de fondo</h1>
      <h2 class="page-header__subtitle">Colores</h2>
    </header>
    
    <section class="color-grid" aria-label="Paleta de colores CSS">
      <div class="color-grid__header">Colors</div>
      <div class="color-card color-card--black">black</div>
      <div class="color-card color-card--teal">teal</div>
      <div class="color-card color-card--blue">blue</div>
      <div class="color-card color-card--navy">navy</div>
      <div class="color-card color-card--lime">lime</div>
      <div class="color-card color-card--white">white</div>
      <div class="color-card color-card--purple">purple</div>
      <div class="color-card color-card--yellow">yellow</div>
      <div class="color-card color-card--olive">olive</div>
      <div class="color-card color-card--red">red</div>
      <div class="color-card color-card--maroon">maroon</div>
      <div class="color-card color-card--gray">gray</div>
      <div class="color-card color-card--olivedrab">olivedrab</div>
      <div class="color-card color-card--deepskyblue">deep sky blue</div>
      <div class="color-card color-card--fuchsia">fuchsia</div>
      <div class="color-card color-card--green">green</div>
    </section>
  </main>
</body>
</html>
